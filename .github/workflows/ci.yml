name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  PROTOC: /usr/bin/protoc

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build grok binary
        run: cargo build -p xai-grok-pager-bin

      - name: Smoke-test the binary
        run: ./target/debug/xai-grok-pager --version

      - name: Test (core + telemetry-disabled crates)
        run: cargo test -p xai-grok-config -p xai-grok-telemetry -p xai-mixpanel
